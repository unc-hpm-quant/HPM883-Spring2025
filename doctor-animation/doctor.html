<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Perfect Doctor Problem - Selection Bias Animation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="doctor-app-container"></div>

  <script>
    // Generate patients with predetermined potential outcomes
    function generatePatients(count = 10) {
      const baseY0 = [45, 62, 38, 71, 55, 48, 67, 42, 58, 35];
      const baseY1 = [52, 58, 55, 65, 70, 40, 72, 60, 50, 48];

      return Array.from({ length: count }, (_, i) => {
        const y0 = baseY0[i % baseY0.length];
        const y1 = baseY1[i % baseY1.length];
        const delta = y1 - y0;

        return {
          id: i + 1,
          name: `Patient ${i + 1}`,
          y0,
          y1,
          delta,
          assigned: null,
          observed: null
        };
      });
    }

    // App state
    let patients = generatePatients(10);
    let scenario = null;
    let animationStep = 0;
    let isAnimating = false;
    let showCounterfactuals = true;
    let animationSpeed = 800;
    let animationTimeout = null;

    const container = document.getElementById('doctor-app-container');

    // Calculate statistics
    function calculateStats() {
      const treated = patients.filter(p => p.assigned === 'treatment');
      const control = patients.filter(p => p.assigned === 'control');

      if (treated.length === 0 || control.length === 0) {
        return { naiveATE: null, trueATE: null, bias: null };
      }

      const trueATE = patients.reduce((sum, p) => sum + p.delta, 0) / patients.length;
      const avgTreated = treated.reduce((sum, p) => sum + p.y1, 0) / treated.length;
      const avgControl = control.reduce((sum, p) => sum + p.y0, 0) / control.length;
      const naiveATE = avgTreated - avgControl;
      const bias = naiveATE - trueATE;

      return {
        naiveATE: naiveATE.toFixed(2),
        trueATE: trueATE.toFixed(2),
        bias: bias.toFixed(2),
        avgTreated: avgTreated.toFixed(2),
        avgControl: avgControl.toFixed(2),
        nTreated: treated.length,
        nControl: control.length
      };
    }

    // Assign treatment based on scenario
    function assignTreatment(patient, scenarioType) {
      switch (scenarioType) {
        case 'perfect':
          return patient.delta > 0 ? 'treatment' : 'control';
        case 'bad':
          return patient.delta < 0 ? 'treatment' : 'control';
        case 'random':
          return Math.random() > 0.5 ? 'treatment' : 'control';
        default:
          return null;
      }
    }

    // Reset patients
    function resetPatients() {
      patients = generatePatients(10);
      animationStep = 0;
      isAnimating = false;
      scenario = null;
      if (animationTimeout) {
        clearTimeout(animationTimeout);
      }
      render();
    }

    // Run animation
    function runAnimation(scenarioType) {
      scenario = scenarioType;
      animationStep = 0;
      isAnimating = true;

      // Reset all patients
      patients = patients.map(p => ({ ...p, assigned: null, observed: null }));
      render();

      let step = 0;
      const animate = () => {
        if (step < patients.length) {
          const assignment = assignTreatment(patients[step], scenarioType);
          patients[step].assigned = assignment;
          patients[step].observed = assignment === 'treatment' ? patients[step].y1 : patients[step].y0;
          animationStep = step + 1;
          step++;
          render();
          animationTimeout = setTimeout(animate, animationSpeed);
        } else {
          isAnimating = false;
          render();
        }
      };

      animationTimeout = setTimeout(animate, 500);
    }

    // Get scenario descriptions
    function getScenarioTitle() {
      switch (scenario) {
        case 'perfect': return 'Perfect Doctor';
        case 'bad': return 'Bad Doctor';
        case 'random': return 'Random Assignment';
        default: return 'Select a Scenario';
      }
    }

    function getScenarioDescription() {
      switch (scenario) {
        case 'perfect':
          return 'The "perfect" doctor knows each patient\'s treatment effect and only treats those who will benefit (delta > 0). This seems ideal but creates severe selection bias!';
        case 'bad':
          return 'The "bad" doctor perversely only treats patients who will be harmed by treatment (delta < 0). This is the opposite extreme, also creating bias.';
        case 'random':
          return 'Random assignment ignores individual effects and assigns treatment by chance. This eliminates selection bias and allows unbiased estimation of the ATE.';
        default:
          return 'Choose a scenario to see how different assignment mechanisms affect our ability to estimate treatment effects.';
      }
    }

    // Main render function
    function render() {
      const stats = calculateStats();

      container.innerHTML = `
        <div class="doctor-container">
          <h1 class="doctor-title">The Perfect Doctor Problem</h1>
          <p class="doctor-subtitle">
            An Interactive Demonstration of Selection Bias in Treatment Assignment
          </p>

          <!-- Control Panel -->
          <div class="control-panel">
            <div class="scenario-buttons">
              <button
                onclick="runAnimation('perfect')"
                ${isAnimating ? 'disabled' : ''}
                class="scenario-btn perfect ${scenario === 'perfect' ? 'active' : ''}"
              >
                Perfect Doctor
              </button>
              <button
                onclick="runAnimation('bad')"
                ${isAnimating ? 'disabled' : ''}
                class="scenario-btn bad ${scenario === 'bad' ? 'active' : ''}"
              >
                Bad Doctor
              </button>
              <button
                onclick="runAnimation('random')"
                ${isAnimating ? 'disabled' : ''}
                class="scenario-btn random ${scenario === 'random' ? 'active' : ''}"
              >
                Random Assignment
              </button>
            </div>

            <div class="control-options">
              <label class="toggle-label">
                <input
                  type="checkbox"
                  ${showCounterfactuals ? 'checked' : ''}
                  onchange="showCounterfactuals = this.checked; render();"
                />
                Show Counterfactuals (Y0, Y1)
              </label>

              <label class="speed-label">
                Speed:
                <select
                  onchange="animationSpeed = Number(this.value);"
                  ${isAnimating ? 'disabled' : ''}
                >
                  <option value="1200" ${animationSpeed === 1200 ? 'selected' : ''}>Slow</option>
                  <option value="800" ${animationSpeed === 800 ? 'selected' : ''}>Normal</option>
                  <option value="400" ${animationSpeed === 400 ? 'selected' : ''}>Fast</option>
                </select>
              </label>

              <button onclick="resetPatients()" ${isAnimating ? 'disabled' : ''} class="reset-btn">
                Reset
              </button>
            </div>
          </div>

          <!-- Scenario Description -->
          <div class="scenario-info ${scenario ? 'active' : ''}">
            <h3>${getScenarioTitle()}</h3>
            <p>${getScenarioDescription()}</p>
          </div>

          <!-- Main Animation Area -->
          <div class="animation-area">
            <!-- Doctor Visual -->
            <div class="doctor-visual">
              <div class="doctor-icon ${isAnimating ? 'thinking' : ''} ${scenario || ''}">
                <svg viewBox="0 0 100 100" class="doctor-svg">
                  <!-- Doctor body -->
                  <circle cx="50" cy="30" r="20" fill="#f5d0c5" />
                  <rect x="30" y="48" width="40" height="45" rx="5" fill="#fff" stroke="#13294B" stroke-width="2" />
                  <!-- Stethoscope -->
                  <path d="M35 55 Q25 70 40 80" fill="none" stroke="#4B9CD3" stroke-width="3" />
                  <circle cx="40" cy="80" r="5" fill="#4B9CD3" />
                  <!-- Face -->
                  <circle cx="43" cy="28" r="3" fill="#333" />
                  <circle cx="57" cy="28" r="3" fill="#333" />
                  <path d="M45 38 Q50 42 55 38" fill="none" stroke="#333" stroke-width="2" />
                  ${isAnimating ? `
                    <!-- Thought bubble when animating -->
                    <circle cx="80" cy="20" r="4" fill="#e2e8f0" class="thought-bubble" />
                    <circle cx="85" cy="12" r="6" fill="#e2e8f0" class="thought-bubble" />
                    <ellipse cx="92" cy="5" rx="8" ry="5" fill="#e2e8f0" class="thought-bubble" />
                    <text x="92" y="7" text-anchor="middle" font-size="6" fill="#333">delta?</text>
                  ` : ''}
                </svg>
                <div class="doctor-label">
                  ${scenario === 'perfect' ? 'Only treating benefiters!' : ''}
                  ${scenario === 'bad' ? 'Only treating those harmed!' : ''}
                  ${scenario === 'random' ? 'Flipping a coin...' : ''}
                  ${!scenario ? 'Waiting for assignment rule...' : ''}
                </div>
              </div>
            </div>

            <!-- Patient Table -->
            <div class="patient-table-container">
              <table class="patient-table">
                <thead>
                  <tr>
                    <th>Patient</th>
                    ${showCounterfactuals ? '<th>Y<sup>0</sup></th>' : ''}
                    ${showCounterfactuals ? '<th>Y<sup>1</sup></th>' : ''}
                    ${showCounterfactuals ? '<th>&delta;<sub>i</sub></th>' : ''}
                    <th>Assignment</th>
                    <th>Observed Y</th>
                  </tr>
                </thead>
                <tbody>
                  ${patients.map((patient, index) => `
                    <tr class="patient-row ${patient.assigned ? 'assigned' : ''} ${patient.assigned === 'treatment' ? 'treated' : ''} ${patient.assigned === 'control' ? 'control' : ''} ${index === animationStep - 1 && isAnimating ? 'just-assigned' : ''}">
                      <td class="patient-name">${patient.name}</td>
                      ${showCounterfactuals ? `<td class="outcome y0 ${patient.assigned === 'control' ? 'observed' : 'counterfactual'}">${patient.y0}</td>` : ''}
                      ${showCounterfactuals ? `<td class="outcome y1 ${patient.assigned === 'treatment' ? 'observed' : 'counterfactual'}">${patient.y1}</td>` : ''}
                      ${showCounterfactuals ? `<td class="delta ${patient.delta > 0 ? 'positive' : patient.delta < 0 ? 'negative' : 'zero'}">${patient.delta > 0 ? '+' : ''}${patient.delta}</td>` : ''}
                      <td class="assignment">
                        ${patient.assigned ? `<span class="assignment-badge ${patient.assigned}">${patient.assigned === 'treatment' ? 'Treatment' : 'Control'}</span>` : ''}
                      </td>
                      <td class="observed">
                        ${patient.observed !== null ? patient.observed : '&mdash;'}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Statistics Panel -->
          <div class="stats-panel ${stats.naiveATE !== null ? 'active' : ''}">
            <h3>Estimation Results</h3>

            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">True ATE</div>
                <div class="stat-value true-ate">
                  ${stats.trueATE !== null ? stats.trueATE : '&mdash;'}
                </div>
                <div class="stat-note">E[Y<sup>1</sup> - Y<sup>0</sup>]</div>
              </div>

              <div class="stat-card">
                <div class="stat-label">Naive Estimate</div>
                <div class="stat-value naive-ate">
                  ${stats.naiveATE !== null ? stats.naiveATE : '&mdash;'}
                </div>
                <div class="stat-note">E[Y|D=1] - E[Y|D=0]</div>
              </div>

              <div class="stat-card highlight">
                <div class="stat-label">Selection Bias</div>
                <div class="stat-value bias ${parseFloat(stats.bias) > 0 ? 'positive' : parseFloat(stats.bias) < 0 ? 'negative' : ''}">
                  ${stats.bias !== null ? (parseFloat(stats.bias) > 0 ? '+' : '') + stats.bias : '&mdash;'}
                </div>
                <div class="stat-note">Naive - True</div>
              </div>
            </div>

            ${stats.naiveATE !== null ? `
              <div class="stats-breakdown">
                <div class="breakdown-row">
                  <span>Avg. outcome for treated (n=${stats.nTreated}):</span>
                  <span class="breakdown-value">${stats.avgTreated}</span>
                </div>
                <div class="breakdown-row">
                  <span>Avg. outcome for control (n=${stats.nControl}):</span>
                  <span class="breakdown-value">${stats.avgControl}</span>
                </div>
              </div>
            ` : ''}
          </div>

          <!-- Explanation Panel -->
          ${stats.naiveATE !== null ? `
            <div class="explanation-panel ${scenario}">
              <h3>What's Happening?</h3>
              ${scenario === 'perfect' ? `
                <div class="explanation-content">
                  <p>
                    <strong>The Paradox of the Perfect Doctor:</strong> By only treating patients who benefit
                    (&delta; &gt; 0), the treated group has systematically higher Y<sup>1</sup> values, while the control group
                    has systematically lower Y<sup>0</sup> values.
                  </p>
                  <p>
                    The naive comparison E[Y|D=1] - E[Y|D=0] = ${stats.naiveATE} <strong>overestimates</strong> the
                    true treatment effect of ${stats.trueATE} by ${Math.abs(parseFloat(stats.bias)).toFixed(2)} points!
                  </p>
                  <p class="key-insight">
                    <strong>Key Insight:</strong> Even perfect knowledge about treatment effects leads to biased
                    estimates because we're comparing apples to oranges&mdash;patients who benefit vs. patients who don't.
                  </p>
                </div>
              ` : ''}
              ${scenario === 'bad' ? `
                <div class="explanation-content">
                  <p>
                    <strong>The Perverse Doctor:</strong> By only treating patients who are harmed
                    (&delta; &lt; 0), the treated group has systematically lower Y<sup>1</sup> values than average, while
                    the control group has patients who would have benefited.
                  </p>
                  <p>
                    The naive comparison E[Y|D=1] - E[Y|D=0] = ${stats.naiveATE} <strong>underestimates</strong> the
                    true treatment effect of ${stats.trueATE} by ${Math.abs(parseFloat(stats.bias)).toFixed(2)} points!
                  </p>
                  <p class="key-insight">
                    <strong>Key Insight:</strong> Selection based on treatment effects&mdash;in either direction&mdash;creates
                    bias. The problem isn't the direction of selection, it's selection itself.
                  </p>
                </div>
              ` : ''}
              ${scenario === 'random' ? `
                <div class="explanation-content">
                  <p>
                    <strong>The Power of Randomization:</strong> By assigning treatment randomly, both groups
                    contain a mix of patients&mdash;some who benefit and some who don't.
                  </p>
                  <p>
                    The naive comparison E[Y|D=1] - E[Y|D=0] = ${stats.naiveATE} is an <strong>unbiased estimate</strong> of
                    the true treatment effect of ${stats.trueATE}. The difference of ${stats.bias} is due only to random sampling variation.
                  </p>
                  <p class="key-insight">
                    <strong>Key Insight:</strong> Randomization makes treatment independent of potential outcomes,
                    eliminating selection bias. This is why RCTs are the "gold standard" for causal inference!
                  </p>
                </div>
              ` : ''}
            </div>
          ` : ''}

          <!-- Formula Reference -->
          <div class="formula-reference">
            <h4>Key Formulas</h4>
            <div class="formula-grid">
              <div class="formula">
                <span class="formula-name">Individual Treatment Effect:</span>
                <span class="formula-math">&delta;<sub>i</sub> = Y<sup>1</sup><sub>i</sub> - Y<sup>0</sup><sub>i</sub></span>
              </div>
              <div class="formula">
                <span class="formula-name">Average Treatment Effect:</span>
                <span class="formula-math">ATE = E[Y<sup>1</sup> - Y<sup>0</sup>]</span>
              </div>
              <div class="formula">
                <span class="formula-name">Naive Estimate:</span>
                <span class="formula-math">E[Y|D=1] - E[Y|D=0]</span>
              </div>
              <div class="formula">
                <span class="formula-name">Selection Bias:</span>
                <span class="formula-math">E[Y<sup>0</sup>|D=1] - E[Y<sup>0</sup>|D=0]</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      render();
    });

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      render();
    }
  </script>
</body>
</html>
